<!DOCTYPE html>
<html>
<head>
    <title>Honeypot Control Panel</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-dark text-white text-center">

<div class="container py-5">

    <h1 class="text-info">🎯 Honeypot Control Panel</h1>

    <h3 class="mt-3">
        حالة النظام:
        {% if status %}
            <span class="text-success">🟢 شغال</span>
        {% else %}
            <span class="text-danger">🔴 متوقف</span>
        {% endif %}
    </h3>

    <div class="mt-4">
        <a href="/start" class="btn btn-success m-2">تشغيل النظام</a>
        <a href="/stop" class="btn btn-danger m-2">إيقاف النظام</a>
        <a href="/dashboard" class="btn btn-info m-2">فتح الداشبورد</a>
    </div>

    <hr class="my-4">

    <h3>🔥 اختبارات هجوم (اختياري)</h3>

    <a href="/attack/5000" class="btn btn-warning m-2">هجوم 5000</a>

</div>

</body>
</html>
